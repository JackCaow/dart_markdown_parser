name: dart_markdown_parser
description: >-
  A pure Dart markdown parser with AST output. Supports CommonMark, GFM,
  math formulas, footnotes, nested lists, and an extensible plugin system.
  Zero external dependencies.
version: 0.2.0
homepage: https://github.com/JackCaow/dart_markdown_parser
repository: https://github.com/JackCaow/dart_markdown_parser

topics:
  - markdown
  - parser
  - ast
  - commonmark
  - gfm

environment:
  sdk: '>=3.0.0 <4.0.0'

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0
